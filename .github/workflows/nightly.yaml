name: Nightly rexglue-sdk

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

env:
  DEV_BRANCH: development
  NIGHTLY_TAG_PREFIX: nightly-
  NIGHTLY_RETENTION: 10
  RELEASE_LIST_LIMIT: 1000

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.compare.outputs.should_build }}
      dev_sha: ${{ steps.compare.outputs.dev_sha }}
      prev_nightly_sha: ${{ steps.compare.outputs.prev_nightly_sha }}
      tag_name: ${{ steps.compare.outputs.tag_name }}
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v6
        with:
          ref: ${{ env.DEV_BRANCH }}
          fetch-depth: 1

      - name: Compare dev HEAD to most recent nightly
        id: compare
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dev_sha=$(git rev-parse HEAD)
          short_sha="${dev_sha:0:8}"
          tag_name="${NIGHTLY_TAG_PREFIX}$(date -u +%Y%m%d)-${short_sha}"
          echo "dev_sha=${dev_sha}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          prev_release=$(gh release list --limit "${RELEASE_LIST_LIMIT}" \
            --json tagName,isPrerelease,createdAt \
            | jq -r --arg prefix "${NIGHTLY_TAG_PREFIX}" \
                '[.[] | select(.isPrerelease) | select(.tagName | startswith($prefix))]
                  | sort_by(.createdAt) | last | .tagName // ""' \
            2>/dev/null || echo "")
          if [ -n "${prev_release}" ]; then
            prev_sha=$(gh release view "${prev_release}" --json targetCommitish -q .targetCommitish 2>/dev/null || echo "")
          else
            prev_sha=""
          fi
          echo "prev_nightly_sha=${prev_sha}" >> "$GITHUB_OUTPUT"
          if [ "${dev_sha}" = "${prev_sha}" ]; then
            echo "${DEV_BRANCH} unchanged since last nightly (${dev_sha}); skipping build."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "${DEV_BRANCH} advanced (${prev_sha:-<no prior nightly>} -> ${dev_sha}); building as ${tag_name}."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build-win-amd64:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.v }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.check.outputs.dev_sha }}
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Install LLVM, CMake, Ninja
        run: choco install llvm cmake ninja -y

      - name: Configure
        run: cmake --preset win-amd64

      - name: Install
        run: cmake --build out/build/win-amd64 --target install -j20

      - name: Read version
        id: version
        shell: bash
        run: |
          v=$(sed -nE 's/^#define REXGLUE_VERSION_STRING "([^"]+)".*/\1/p' \
            out/build/win-amd64/include/rex/version.h)
          echo "v=${v}" >> "$GITHUB_OUTPUT"

      - name: Package
        shell: bash
        run: |
          cd out/install
          7z a "rexglue-sdk-${{ steps.version.outputs.v }}-win-amd64.zip" win-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: nightly-win-amd64
          path: out/install/rexglue-sdk-*-win-amd64.zip
          retention-days: 14

  build-linux-amd64:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.v }}
    env:
      CC: clang-20
      CXX: clang++-20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.check.outputs.dev_sha }}
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Install Clang 20
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
          sudo apt-get install -y clang-20 lld-20

      - name: Update alternatives
        run: |
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-20 200
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-20 200

      - name: Install build dependencies
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-noble.list http://packages.lunarg.com/vulkan/lunarg-vulkan-noble.list
          sudo apt update
          sudo apt install -y cmake ninja-build build-essential git curl unzip autoconf python3.12-venv \
            libgtk-3-dev libx11-xcb-dev wine vulkan-sdk

      - name: Configure
        run: cmake --preset linux-amd64

      - name: Install
        run: cmake --build out/build/linux-amd64 --target install -j20

      - name: Read version
        id: version
        run: |
          v=$(sed -nE 's/^#define REXGLUE_VERSION_STRING "([^"]+)".*/\1/p' \
            out/build/linux-amd64/include/rex/version.h)
          echo "v=${v}" >> "$GITHUB_OUTPUT"

      - name: Package
        run: |
          cd out/install
          zip -r "rexglue-sdk-${{ steps.version.outputs.v }}-linux-amd64.zip" linux-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: nightly-linux-amd64
          path: out/install/rexglue-sdk-*-linux-amd64.zip
          retention-days: 14

  build-linux-arm64:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-24.04-arm
    outputs:
      version: ${{ steps.version.outputs.v }}
    env:
      CC: clang-20
      CXX: clang++-20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.check.outputs.dev_sha }}
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Install Clang 20
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
          sudo apt-get install -y clang-20 lld-20

      - name: Update alternatives
        run: |
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-20 200
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-20 200

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build build-essential git curl unzip autoconf python3.12-venv \
            libgtk-3-dev libx11-xcb-dev libvulkan-dev glslc glslang-tools

      - name: Configure
        run: cmake --preset linux-arm64

      - name: Install
        run: cmake --build out/build/linux-arm64 --target install -j$(nproc)

      - name: Read version
        id: version
        run: |
          v=$(sed -nE 's/^#define REXGLUE_VERSION_STRING "([^"]+)".*/\1/p' \
            out/build/linux-arm64/include/rex/version.h)
          echo "v=${v}" >> "$GITHUB_OUTPUT"

      - name: Package
        run: |
          cd out/install
          zip -r "rexglue-sdk-${{ steps.version.outputs.v }}-linux-arm64.zip" linux-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: nightly-linux-arm64
          path: out/install/rexglue-sdk-*-linux-arm64.zip
          retention-days: 14

  publish:
    needs: [check, build-win-amd64, build-linux-amd64, build-linux-arm64]
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.check.outputs.dev_sha }}
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Publish nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.build-win-amd64.outputs.version }}
          DEV_SHA: ${{ needs.check.outputs.dev_sha }}
          PREV_SHA: ${{ needs.check.outputs.prev_nightly_sha }}
          TAG_NAME: ${{ needs.check.outputs.tag_name }}
        run: |
          if [ -n "${PREV_SHA}" ] && git cat-file -e "${PREV_SHA}^{commit}" 2>/dev/null; then
            commits=$(git log --no-merges --pretty='format:- %s (%h)' "${PREV_SHA}..${DEV_SHA}")
            range_header="Changes since previous nightly (\`${PREV_SHA:0:8}\`):"
          else
            commits=$(git log --no-merges --pretty='format:- %s (%h)' -20 "${DEV_SHA}")
            range_header="Latest commits on \`${DEV_BRANCH}\`:"
          fi
          if [ -z "${commits}" ]; then
            commits="- (no new commits)"
          fi
          notes=$(printf '%s\n\n%s\n' "${range_header}" "${commits}")
          gh release create "${TAG_NAME}" \
            --target "${DEV_SHA}" \
            --title "Nightly ${VERSION}" \
            --notes "${notes}" \
            --prerelease \
            artifacts/nightly-win-amd64/*.zip \
            artifacts/nightly-linux-amd64/*.zip \
            artifacts/nightly-linux-arm64/*.zip

      - name: Prune old nightlies
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit "${RELEASE_LIST_LIMIT}" \
            --json tagName,isPrerelease,createdAt \
            | jq -r --arg prefix "${NIGHTLY_TAG_PREFIX}" --argjson keep "${NIGHTLY_RETENTION}" \
                '[.[] | select(.isPrerelease) | select(.tagName | startswith($prefix))]
                  | sort_by(.createdAt) | reverse | .[$keep:] | .[].tagName' \
            | while IFS= read -r tag; do
                [ -z "${tag}" ] && continue
                echo "Pruning ${tag}"
                gh release delete "${tag}" --yes --cleanup-tag
              done
